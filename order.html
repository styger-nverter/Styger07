<!DOCTYPE html>
<html>
<head>
<title>Order Product - Styger</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
padding:40px;
}

form{
background:white;
padding:30px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#ffd000;
padding:12px;
border:none;
width:100%;
font-size:16px;
border-radius:5px;
}

h2{
color:#0b3d91;
}

.note{
color:#444;
font-size:14px;
margin-top:10px;
}

</style>

</head>

<body>

<h2>Order Product</h2>

<form>

<input type="text" placeholder="Your Name" required>

<input type="tel" placeholder="Phone Number" required>

<select>
<option>Select Product</option>
<option>Home Inverter</option>
<option>Voltage Stabilizer</option>
<option>Air Cooler</option>
</select>

<input type="date" placeholder="Pickup Date">

<button>Place Order</button>

<p class="note">Note: Products must be collected from our shop.</p>

</form>

</body>
</html>
