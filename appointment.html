<!DOCTYPE html>
<html>
<head>
<title>Book Appointment - Styger</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
text-align:center;
padding:40px;
}

form{
background:white;
padding:30px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select, textarea{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#0b3d91;
color:white;
padding:12px;
border:none;
width:100%;
font-size:16px;
border-radius:5px;
}

h2{
color:#0b3d91;
}

</style>

</head>

<body>

<h2>Book Repair Appointment</h2>

<form>

<input type="text" placeholder="Your Name" required>

<input type="tel" placeholder="Phone Number" required>

<select>
<option>Select Device</option>
<option>Inverter</option>
<option>Stabilizer</option>
<option>Air Cooler</option>
</select>

<textarea placeholder="Describe the problem"></textarea>

<input type="date">

<button>Submit Appointment</button>

</form>

</body>
</html>
